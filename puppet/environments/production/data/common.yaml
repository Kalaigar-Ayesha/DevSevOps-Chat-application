---
# Docker baseline
docker::manage_package: false
docker::package_name: docker.io
docker::service_name: docker
docker::daemon_json: |
  {
    "exec-opts": ["native.cgroupdriver=systemd"],
    "log-driver": "json-file",
    "log-opts": {
      "max-size": "100m",
      "max-file": "5"
    },
    "storage-driver": "overlay2"
  }

# Kubernetes defaults
kubernetes::version: 1.29.4-1.1
kubernetes::master::pod_cidr: 10.244.0.0/16
kubernetes::join_command: "kubeadm join 10.0.10.10:6443 --token <replace-token> --discovery-token-ca-cert-hash sha256:<replace-hash>"

# OS hardening and baseline tuning
system::timezone: Etc/UTC
system::sysctl_content: |
  net.bridge.bridge-nf-call-iptables = 1
  net.bridge.bridge-nf-call-ip6tables = 1
  net.ipv4.ip_forward = 1
  vm.swappiness = 10
  fs.inotify.max_user_instances = 1024
  fs.inotify.max_user_watches = 524288
system::limits_content: |
  * soft nofile 65535
  * hard nofile 65535
  * soft nproc 65535
  * hard nproc 65535

# Security defaults
security::sshd_config_path: /etc/ssh/sshd_config
security::ssh_package_name: openssh-server
security::ssh_service_name: ssh
security::sshd_validate_cmd: /usr/sbin/sshd -t -f %
security::sshd_config_content: |
  Port 22
  Protocol 2
  PermitRootLogin no
  PasswordAuthentication no
  PubkeyAuthentication yes
  ChallengeResponseAuthentication no
  UsePAM yes
  X11Forwarding no
  PrintMotd no
  ClientAliveInterval 300
  ClientAliveCountMax 2
  LoginGraceTime 30
  MaxAuthTries 3
  PermitEmptyPasswords no
  AllowTcpForwarding no
  AllowAgentForwarding no
  Subsystem sftp /usr/lib/openssh/sftp-server
security::allowed_tcp_ports:
  - "22"
  - "9100"
security::fail2ban::jail_local_content: |
  [DEFAULT]
  bantime = 1h
  findtime = 10m
  maxretry = 5
  backend = systemd

  [sshd]
  enabled = true
  port = ssh
  logpath = %(sshd_log)s
  mode = aggressive

# Monitoring defaults
monitoring::node_exporter_version: 1.8.1
monitoring::node_exporter_user: nodeexp
monitoring::promtail_package: promtail
monitoring::promtail_config: |
  server:
    http_listen_port: 9080
    grpc_listen_port: 0
  positions:
    filename: /var/lib/promtail/positions.yaml
  clients:
    - url: http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push
  scrape_configs:
    - job_name: varlogs
      static_configs:
        - targets:
            - localhost
          labels:
            job: varlogs
            host: ${HOSTNAME}
            __path__: /var/log/*.log

# User and access management
users::devops_user: devops
users::devops_shell: /bin/bash
users::devops_ssh_public_keys:
  - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIExampleReplaceWithRealKey1 devops@chat-platform"
